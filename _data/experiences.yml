- role: "Graduate Research Assistant"
  organization: "Hildebrand Department of Petroleum & Geosystems Engineering, UT Austin"
  organization_url: "https://sites.google.com/utexas.edu/masha/people?authuser=0"
  period: "Aug 2024 – Present"
  current: true
  supervisor: "Prof. Maša Prodanović"
  supervisor_url: "https://pge.utexas.edu/facultystaff/faculty-directory/prodanovic"
  tags: ["Digital Rock Physics", "LBM", "CCUS", "UHS", "Python"]
  images:
    - /images/gra.png
    - /images/gra2.png
  projects:
    - title: "BayesFracX"
      description: >-
        Open-source pipeline for automatic identification and characterization
        of fractures in digital rock images. Developed a Dirichlet-Process
        Bayesian Gaussian Mixture Model (DP-BGMM) that detects and classifies
        fractures from μCT images. Processed fracture data exports directly to
        commercial DFN simulators (dfnWorks, CMG), enabling upscaling to
        reservoir-scale performance models. Case studies deployed using the
        [Digital Porous Media](https://www.digitalporousmedia.org/) portal.
        Planned for AGU25 with journal publication and software release.

    - title: "Digital Twin of the Texas Power System for CCUS, UHS, and Geo-Methanation"
      description: >-
        Extending the award-winning CO₂-as-energy-commodity framework from the
        [46th IAEE](https://www.iaee.org/proceedings/article/19034) to a digital
        twin of the Texas power system. Integrates market equilibrium, stakeholder
        coordination (emitters, O&G producers, policymakers), and reservoir
        capacity to forecast CO₂ selling price and investment potential. Being
        extended to underground hydrogen storage and geo-methanation for a
        unified multi-vector storage assessment.

    - title: "Proppant Transport in Rough Fractures"
      description: >-
        Coupled finite element–discrete element (FEM–DEM) simulations on
        BayesFracX-identified fracture networks. Studies proppant placement
        efficiency, bridging risk, and fracture conductivity under realistic
        geometries. Completes the pipeline from μCT fracture identification to
        particle-scale simulation and DFN upscaling.

    - title: "Beyond Circular Tubes in MICP Analysis"
      description: >-
        New pore-size-distribution model that replaces the standard circular
        capillary tube assumption in MICP with triangular and horn-shaped
        triangular geometries for a more realistic description of pore systems.
        Under preparation for journal submission; planned for SPWLA 2026.

    - title: "Analytical Framework for Hydrogen Storage & Geo-Methanation"
      description: >-
        Mathematical model covering H₂ injection into depleted reservoirs,
        H₂+CO₂ co-injection for geo-methanation, and H₂ injection for enhanced
        gas recovery. Integrates material balance, multiple EoS, advection-driven
        gas mixing, water influx, and Gibbs-energy minimization. Published in
        [Energy Conversion & Management (2025)](https://www.sciencedirect.com/science/article/pii/S0196890425008520).

- role: "Researcher — Technologies for the Energy Transition"
  organization: "Fondazione Eni Enrico Mattei (FEEM)"
  organization_url: "https://www.feem.it/ricerca/programmi/technologies-for-the-energy-transition/"
  period: "Sep 2023 – Sep 2024"
  tags: ["Game Theory", "PLEXOS", "Energy Economics", "Stochastic Modeling"]
  images:
    - /images/feem.png
  projects:
    - title: "Coupling Game Theory with Reservoir Models"
      description: >-
        Framework to evaluate coordination and utility of CCUS and UHS value-chain
        stakeholders. At the 45th IAEE, introduced the price of CO₂ as an energy
        commodity, moving beyond the carbon-tax framing. Demonstrated that a CCUS
        infrastructure in Cyprus's Aphrodite Gas Field could generate positive NPV
        for emitters and O&G producers with limited government subsidy.
        Methodology now being implemented in the Ravenna CCS hub (Eni SpA) for
        emitters in Lombardy, Veneto, and Emilia Romagna.

    - title: "Decarbonization of a Residential House in the EU"
      description: >-
        Designed insulation and PV system for a Net-Zero upgrade of a house in
        Limassol, Cyprus. Turned the groundwork into a novel stochastic cashflow
        model for project profitability. Now generalizing the model across the
        whole Cyprus market using behavioral-economics-informed input distributions.

    - title: "Energy Transition Modeling in PLEXOS"
      description: >-
        Consultancy on modeling European electricity and gas markets in
        [PLEXOS](https://www.energyexemplar.com/plexos) for [CESI](https://www.cesi.it/)
        and the [World Bank](https://www.worldbank.org/en/home) on the
        [Black Sea Electricity Project](https://www.euronews.com/2022/12/17/hungary-romania-georgia-azerbaijan-agree-to-black-sea-electricity-project).
        Built a Python .NET automation pipeline for end-to-end PLEXOS project
        execution from input to visualization.

