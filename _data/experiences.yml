  period: "Jul 2021 – Jul 2023"
  tags: ["Thermodynamics", "Tungsten Nanostructures"]
  images:
    - /images/thermo.png
  projects:
    - title: "Thermodynamic Control of Reactive Spontaneous Systems"
      description: >-
        Fundamental work regulating equilibrium of chemical reactions by adjusting
        the rate of change of auxiliary functions. Control the rate of chemical
