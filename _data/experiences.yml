- role: "Researcher — Geomechanics for Energy and Environment"
  organization: "University of Cyprus"
  organization_url: "https://websites.ucy.ac.cy/energygeomechanics/"
  period: "Jan 2023 – Jul 2024"
  tags: ["CCS", "Field Development", "Material Balance", "MATLAB"]
  images:
    - /images/gree.png
  funding:
    name: "FLINUGEE"
    detail: "Fluid Injection in Unconsolidated formations for Geo Energy and Environmental Applications"
    grant_id: "EXCELLENCE/0421/0456"
    funder: "Cyprus Research and Innovation Foundation"
    amount: "€200,000"
  projects:
    - title: "Mathematical & Computational Modelling of Geo-Energy Processes"
      description: >-
        Screening tool (material balance) for CO₂ injection with water influx in
        depleted gas reservoirs and piston-like EGR. Adaptable to dry and
        condensate reservoirs with stochastic petrophysical heterogeneity.
        Grid-independent, positions CO₂ as a marketable product. Now being
        extended to hydrogen storage with "pseudo-dispersion" and integrated with
        geomechanics simulators.

    - title: "Field Development Strategies"
      description: >-
        MEng thesis work using Petrel and MATLAB to simulate the Norwegian
        section of the Frigg field. Contributions: CO₂ piston-like injection for
        EGR, a semi-stochastic algorithm for optimal double-section casing design
        (heuristic filter-and-sort), a kernel algorithm for spatial accident
        risk factoring distance and POIs, and stochastic project economics with
        uncertainty in production delays, gas prices, CAPEX and OPEX. Several
        strategies integrated into the UCY master's curriculum.

- role: "Researcher — Biomechanics and Living Systems Analysis"
  organization: "Cyprus University of Technology"
  organization_url: "http://biolisys.cut.ac.cy"
  period: "Jul 2020 – Aug 2024"
  tags: ["PBTK", "ODE Systems", "Optimization"]
  images:
