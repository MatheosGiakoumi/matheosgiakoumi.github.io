    grant_id: "POST-DOC/0916/0237"
    funder: "Cyprus Research and Innovation Foundation"
    amount: "€160,000"
    url: "http://biolisys.cut.ac.cy/research/projects/active-projects/nitoxilico/"
    achievement: "Contributor to [USPTO patent](https://patents.google.com/patent/US20240249808A1/en)"
  projects:
    - title: "Predictive PBTK Models for Cardiovascular Devices"
      description: >-
        Compartmental PBTK model for Nickel leaching from cardiovascular devices.
        In-house animal experiments integrated into time-variant ODE systems,
        framed as a multi-objective optimization problem balancing physiological
        and device parameters. Addressed non-smoothness via global optimization
        and stochastic analysis. Three publications. Now extending to PDE-based
        modeling of the peri-implant environment. Platform "TOXILICO App"
        in development as a hard-tech spin-off.

- role: "Undergraduate Researcher — Materials Thermodynamics Lab"
  organization: "Cyprus University of Technology"
