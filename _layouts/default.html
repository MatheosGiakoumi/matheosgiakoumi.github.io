<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author.name }}">

  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>

  <!-- Theme init: runs inline before paint so there is no flash of wrong-mode content -->
  <script>
    (function() {
      try {
        var stored = localStorage.getItem('theme');
        if (stored === 'dark' || stored === 'light') {
          document.documentElement.setAttribute('data-theme', stored);
        } else {
          document.documentElement.setAttribute('data-theme', 'auto');
        }
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'auto');
      }
    })();
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ site.author.photo | relative_url }}">

  {%- seo -%}
</head>
<body>
  <div class="page">
    {% include sidebar.html %}

    <main class="main">
      {{ content }}
    </main>
  </div>

  <footer>
    © {{ 'now' | date: "%Y" }} {{ site.author.name }} ·
    Last updated {{ site.time | date: "%B %Y" }} ·
    <a href="{{ site.github.repository_url | default: 'https://github.com/MatheosGiakoumi/matheosgiakoumi.github.io' }}">Source on GitHub</a>
  </footer>

  <script>
    // Scroll-spy: highlight current section in sidebar
    (function() {
      const sections = document.querySelectorAll('section[id]');
      const navLinks = document.querySelectorAll('.nav a[href^="#"]');
      if (sections.length && navLinks.length) {
        const onScroll = () => {
          let current = '';
          const scrollY = window.pageYOffset + 100;
          sections.forEach(sec => {
            if (scrollY >= sec.offsetTop) current = sec.id;
          });
          navLinks.forEach(link => {
            link.classList.toggle('active',
              link.getAttribute('href') === '#' + current);
          });
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
      }
    })();

    // Theme toggle
    (function() {
      const toggle = document.getElementById('theme-toggle');
      if (!toggle) return;
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

      function currentResolvedTheme() {
        const attr = document.documentElement.getAttribute('data-theme');
        if (attr === 'dark' || attr === 'light') return attr;
        return prefersDark.matches ? 'dark' : 'light';
      }

      toggle.addEventListener('click', function() {
        const next = currentResolvedTheme() === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
